name: Auto-Close Invalid PRs to Main

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

jobs:
  close-invalid-pr:
    runs-on: ubuntu-latest
    if: github.head_ref != 'develop'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Close PR and leave a comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          pr_state="$(gh pr view "$PR_NUMBER" --json state,mergedAt --jq '.state + "|" + (.mergedAt // "")')"
          if [[ "$pr_state" != OPEN\| ]]; then
            echo "PR $PR_NUMBER já não está aberto; encerrando workflow sem erro."
            exit 0
          fi

          gh pr comment "$PR_NUMBER" --body-file - <<'EOF'
          🚨 **PR recusado automaticamente!** 🚨

          Pull requests para a branch `main` só podem ser abertos a partir da branch `develop`.
          Refaça o fluxo utilizando a branch correta.
          EOF
          gh pr close "$PR_NUMBER"
