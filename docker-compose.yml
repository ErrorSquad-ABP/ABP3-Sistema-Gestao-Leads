services:
  back:
    build:
      context: .
      dockerfile: back/Dockerfile
      target: runner
    container_name: abp3-back
    env_file:
      - ./back/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_URL: http://localhost:3001
      FRONTEND_ORIGINS: http://localhost:3000
    ports:
      - '3001:3001'

  front:
    build:
      context: .
      dockerfile: front/Dockerfile
      target: runner
    container_name: abp3-front
    depends_on:
      back:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_INTERNAL_URL: http://back:3001
    ports:
      - '3000:3000'
